app = "vr180-worker"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

# Single machine — jobs are in-memory, can't split across machines
[processes]
  app = "uvicorn main:app --host 0.0.0.0 --port 8000"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
